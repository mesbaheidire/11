<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="theme-color" content="#9C27B0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>المنشورات المحفوظة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/modern-theme.css">
    <style>
        .header { background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 50%, #5B21B6 100%); padding: 65px 20px 45px; text-align: center; position: relative; overflow: hidden; }
        .header::before { content: ''; position: absolute; top: -40%; right: -20%; width: 250px; height: 250px; background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%); border-radius: 50%; }
        .header::after { content: ''; position: absolute; bottom: -55%; left: -10%; right: -10%; height: 75%; background: var(--bg-primary); border-radius: 50% 50% 0 0; }
        .header > * { position: relative; z-index: 2; }
        .header h1 { font-size: 26px; font-weight: 800; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .header p { opacity: 0.85; font-size: 14px; }
        .back-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); width: 40px; height: 40px; color: #fff; font-size: 18px; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); transition: all var(--transition-fast); z-index: 3; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .content { padding: 30px 20px; max-width: 600px; margin: 0 auto; }
        
        .stats-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: var(--bg-card); border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
        .stats-count { font-size: 14px; color: var(--text-secondary); }
        .stats-count span { color: var(--accent-purple); font-weight: 700; }
        .clear-btn { background: linear-gradient(135deg, #EF4444, #DC2626); border: none; border-radius: var(--radius-sm); color: #fff; padding: 10px 20px; font-family: 'Cairo'; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all var(--transition-fast); }
        .clear-btn:hover { transform: translateY(-1px); }
        .clear-btn:disabled { opacity: 0.5; }
        
        .posts-list { display: flex; flex-direction: column; gap: 12px; }
        
        .post-card { background: var(--bg-card); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-subtle); transition: all var(--transition-normal); }
        .post-card:hover { border-color: rgba(255,255,255,0.1); }
        .post-header { display: flex; gap: 15px; padding: 15px; align-items: flex-start; }
        .post-image { width: 80px; height: 80px; object-fit: cover; border-radius: var(--radius-sm); background: var(--bg-input); }
        .post-image-placeholder { width: 80px; height: 80px; background: var(--bg-input); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 24px; }
        .post-info { flex: 1; min-width: 0; }
        .post-title { font-weight: 600; font-size: 15px; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .post-price { font-size: 14px; color: var(--accent-green); font-weight: 700; margin-bottom: 5px; }
        .post-date { font-size: 12px; color: var(--text-muted); }
        
        .post-actions { display: grid; grid-template-columns: 1fr 1fr 1fr 50px; gap: 8px; padding: 0 15px 15px; }
        .action-btn { border: none; border-radius: var(--radius-sm); color: #fff; padding: 12px; font-family: 'Cairo'; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all var(--transition-fast); position: relative; overflow: hidden; }
        .action-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%); pointer-events: none; }
        .action-btn:hover { transform: translateY(-1px); }
        .action-btn:active { transform: scale(0.95); }
        .republish-btn { background: linear-gradient(135deg, #2AABEE, #229ED9); }
        .fb-btn { background: linear-gradient(135deg, #1877F2, #0C63D4); }
        .edit-btn { background: linear-gradient(135deg, #FF9800, #F57C00); }
        .delete-btn { background: linear-gradient(135deg, #EF4444, #DC2626); }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 60px; margin-bottom: 20px; opacity: 0.15; }
        .empty-state h3 { margin-bottom: 10px; color: var(--text-secondary); }
        .empty-state a { color: var(--accent-purple); text-decoration: none; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(30,30,50,0.9); color: #fff; padding: 14px 28px; border-radius: 16px; display: none; z-index: 2000; font-weight: 600; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); box-shadow: var(--shadow-lg); }
        .toast.show { display: block; animation: fadeInOut 3s ease-in-out; }
        .toast.success { background: rgba(16,185,129,0.9); }
        .toast.error { background: rgba(239,68,68,0.9); }
        
        .loading { text-align: center; padding: 40px; }
        .loading i { font-size: 40px; color: var(--accent-purple); animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <h1><i class="fas fa-history"></i> المنشورات المحفوظة</h1>
        <p>أعد نشر منتجاتك بضغطة واحدة</p>
    </div>

    <div class="content">
        <div class="stats-bar">
            <div class="stats-count"><span id="postsCount">0</span> منشور محفوظ</div>
            <button class="clear-btn" id="clearAllBtn" style="display: none;">
                <i class="fas fa-trash"></i> مسح الكل
            </button>
        </div>

        <div id="loadingState" class="loading">
            <i class="fas fa-spinner fa-spin"></i>
            <p style="margin-top: 15px; color: #888;">جاري التحميل...</p>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-inbox"></i>
            <h3>لا توجد منشورات محفوظة</h3>
            <p>عند نشر أي منتج في تيليجرام، سيتم حفظه هنا تلقائياً</p>
            <p style="margin-top: 15px;"><a href="/telegram.html">انتقل لصفحة النشر <i class="fas fa-arrow-left"></i></a></p>
        </div>

        <div id="postsList" class="posts-list"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let settings = JSON.parse(localStorage.getItem('appSettings')) || {};
        let savedPosts = [];

        function showToast(msg, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        async function loadPosts() {
            document.getElementById('loadingState').style.display = 'none';
            
            // Get posts from localStorage first (always available)
            let localPosts = JSON.parse(localStorage.getItem('savedPosts') || '[]');
            
            // Try to get from server too and merge
            try {
                const res = await fetch('/api/saved-posts');
                const data = await res.json();
                
                if (data.success && data.posts.length > 0) {
                    // Merge server posts with local (avoid duplicates by id)
                    const localIds = new Set(localPosts.map(p => p.id));
                    data.posts.forEach(p => {
                        if (!localIds.has(p.id)) localPosts.push(p);
                    });
                    // Sort by date descending
                    localPosts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    // Limit to 50
                    if (localPosts.length > 50) localPosts = localPosts.slice(0, 50);
                    localStorage.setItem('savedPosts', JSON.stringify(localPosts));
                }
            } catch (e) {
                console.log('Server fetch failed, using localStorage');
            }
            
            if (localPosts.length > 0) {
                savedPosts = localPosts;
                document.getElementById('postsCount').textContent = localPosts.length;
                document.getElementById('clearAllBtn').style.display = 'flex';
                document.getElementById('emptyState').style.display = 'none';
                renderPosts(localPosts);
            } else {
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('postsList').innerHTML = '';
                document.getElementById('clearAllBtn').style.display = 'none';
                document.getElementById('postsCount').textContent = '0';
            }
        }

        function renderPosts(posts) {
            const list = document.getElementById('postsList');
            list.innerHTML = posts.map(p => `
                <div class="post-card" data-id="${p.id}">
                    <div class="post-header">
                        ${p.image ? 
                            `<img src="${p.image}" class="post-image" onerror="this.outerHTML='<div class=\\'post-image-placeholder\\'><i class=\\'fas fa-image\\'></i></div>'">` : 
                            '<div class="post-image-placeholder"><i class="fas fa-image"></i></div>'
                        }
                        <div class="post-info">
                            <div class="post-title">${p.title || 'بدون عنوان'}</div>
                            <div class="post-price">${p.price || ''}</div>
                            <div class="post-date"><i class="fas fa-calendar"></i> ${new Date(p.createdAt).toLocaleDateString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
                        </div>
                    </div>
                    <div class="post-actions">
                        <button class="action-btn republish-btn" onclick="republishPost('${p.id}', this)">
                            <i class="fab fa-telegram"></i> تليغرام
                        </button>
                        <button class="action-btn fb-btn" onclick="republishToFacebook('${p.id}', this)">
                            <i class="fab fa-facebook"></i> فيسبوك
                        </button>
                        <button class="action-btn edit-btn" onclick="editPost('${p.id}')">
                            <i class="fas fa-edit"></i> تعديل
                        </button>
                        <button class="action-btn delete-btn" onclick="deletePost('${p.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function republishPost(id, btn) {
            const post = savedPosts.find(p => p.id === id);
            if (!post) { showToast('لم يتم العثور على المنشور', 'error'); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري النشر...';

            try {
                const credentials = {
                    telegramToken: settings.telegramToken || '',
                    channelId: settings.channelId || '',
                    channelId2: settings.channelId2 || '',
                    channelChoice: 'both'
                };

                const res = await fetch('/api/publish-telegram', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: post.title,
                        price: post.price,
                        link: post.link,
                        coupon: post.coupon || null,
                        image: post.image,
                        settings: settings,
                        credentials: credentials,
                        customMessage: post.message
                    })
                });

                const result = await res.json();
                if (result.success) {
                    showToast('تم إعادة النشر بنجاح! ✅', 'success');
                } else {
                    showToast(result.error || 'فشل النشر', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-telegram"></i> إعادة النشر';
            }
        }

        async function republishToFacebook(id, btn) {
            const post = savedPosts.find(p => p.id === id);
            if (!post) { showToast('لم يتم العثور على المنشور', 'error'); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const res = await fetch('/api/publish-facebook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: post.title,
                        price: post.price,
                        link: post.link,
                        coupon: post.coupon || null,
                        image: post.image,
                        message: post.message || null,
                        settings: settings
                    })
                });

                const result = await res.json();
                if (result.success) {
                    showToast('تم النشر على فيسبوك! ✅', 'success');
                } else {
                    showToast(result.error || 'فشل النشر على فيسبوك', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fab fa-facebook"></i> فيسبوك';
            }
        }

        function editPost(id) {
            const post = savedPosts.find(p => p.id === id);
            if (!post) { showToast('لم يتم العثور على المنشور', 'error'); return; }
            
            const params = new URLSearchParams();
            if (post.title) params.set('title', post.title);
            if (post.price) params.set('price', post.price);
            if (post.link) params.set('link', post.link);
            if (post.image && !post.image.startsWith('data:')) params.set('image', post.image);
            
            window.location.href = '/telegram.html?' + params.toString();
        }

        async function deletePost(id) {
            if (!confirm('هل تريد حذف هذا المنشور؟')) return;
            
            // Delete from localStorage
            let localPosts = JSON.parse(localStorage.getItem('savedPosts') || '[]');
            localPosts = localPosts.filter(p => p.id !== id);
            localStorage.setItem('savedPosts', JSON.stringify(localPosts));
            
            // Delete from server too
            try {
                await fetch(`/api/saved-posts/${id}`, { method: 'DELETE' });
            } catch (e) {}
            
            showToast('تم حذف المنشور', 'success');
            loadPosts();
        }

        document.getElementById('clearAllBtn').onclick = async () => {
            if (!confirm('هل تريد حذف جميع المنشورات المحفوظة؟')) return;
            
            // Clear localStorage
            localStorage.removeItem('savedPosts');
            
            // Clear server too
            try {
                await fetch('/api/saved-posts', { method: 'DELETE' });
            } catch (e) {}
            
            showToast('تم حذف جميع المنشورات', 'success');
            loadPosts();
        };

        loadPosts();
    </script>
</body>
</html>
