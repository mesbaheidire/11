<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="theme-color" content="#0088cc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>نشر في Telegram</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #1a1a2e; min-height: 100vh; color: #fff; }
        .header { background: linear-gradient(135deg, #0088cc, #0077b5); padding: 60px 20px 40px; border-radius: 0 0 30px 30px; text-align: center; position: relative; }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .back-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 40px; height: 40px; color: #fff; font-size: 18px; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .content { padding: 30px 20px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #0088cc; font-size: 14px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #2d2d44; background: #16213e; color: #fff; font-family: 'Cairo', sans-serif; font-size: 14px; direction: rtl; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #0088cc; }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .form-hint { font-size: 11px; color: #666; margin-top: 5px; }
        .section-title { font-size: 18px; font-weight: 700; margin: 30px 0 15px; color: #0088cc; display: flex; align-items: center; gap: 10px; }
        .section-title i { font-size: 20px; }
        .publish-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #0088cc, #0077b5); border: none; border-radius: 12px; color: #fff; font-family: 'Cairo', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 30px; transition: transform 0.2s, box-shadow 0.2s; }
        .publish-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 136, 204, 0.3); }
        .publish-btn:disabled { background: #555; opacity: 0.7; transform: none; box-shadow: none; }
        .preview-card { background: #16213e; border-radius: 15px; padding: 20px; margin-top: 20px; border: 2px dashed #2d2d44; }
        .preview-title { color: #888; font-size: 14px; margin-bottom: 10px; text-align: center; }
        .preview-content { white-space: pre-wrap; font-size: 13px; line-height: 1.8; direction: rtl; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 15px 30px; border-radius: 25px; display: none; z-index: 2000; font-weight: 600; }
        .toast.show { display: block; animation: fadeInOut 3s ease-in-out; }
        .toast.success { background: #4CAF50; }
        .toast.error { background: #ff4444; }
        @keyframes fadeInOut { 0%, 100% { opacity: 0; } 10%, 90% { opacity: 1; } }
        .image-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; }
        .channel-badges { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .channel-badge { background: #0088cc; padding: 5px 15px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <h1><i class="fab fa-telegram"></i> نشر في Telegram</h1>
        <p>انشر العروض مباشرة في قناتك</p>
    </div>

    <div class="content">
        <div class="section-title"><i class="fas fa-box"></i> معلومات المنتج</div>
        
        <div class="form-group">
            <label>اسم المنتج:</label>
            <input type="text" id="productTitle" placeholder="أدخل اسم المنتج..." style="margin-bottom: 10px;">
            <button type="button" id="refineTitleBtn" style="width: 100%; padding: 12px 15px; background: #673AB7; border: none; border-radius: 10px; color: #fff; font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i class="fas fa-magic"></i> تحسين العنوان بالذكاء الاصطناعي
            </button>
        </div>
        
        <div class="form-group" style="display:none;">
            <input type="hidden" id="algerianHook" value="">
            <button type="button" id="generateHookBtn" style="display:none;"></button>
        </div>
        
        <div class="form-group">
            <label>رابط الصورة:</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="productImage" placeholder="https://..." style="flex: 1;">
                <label for="imageUpload" style="margin: 0; cursor: pointer; background: #16213e; border: 2px solid #2d2d44; border-radius: 10px; padding: 12px 20px; display: flex; align-items: center; justify-content: center; transition: all 0.3s;" onmouseover="this.style.borderColor='#0088cc'" onmouseout="this.style.borderColor='#2d2d44'">
                    <i class="fas fa-upload" style="color: #0088cc; font-size: 20px;"></i>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                </label>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button type="button" class="frame-btn" id="frameBtn" style="flex: 1; padding: 12px 20px; background: linear-gradient(135deg, #FF9800, #F57C00); border: none; border-radius: 10px; color: #fff; font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i class="fas fa-image"></i> إطار + لوقو
                </button>
                <button type="button" id="logoOnlyBtn" style="flex: 1; padding: 12px 20px; background: linear-gradient(135deg, #9C27B0, #7B1FA2); border: none; border-radius: 10px; color: #fff; font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i class="fas fa-stamp"></i> لوقو فقط
                </button>
            </div>
            <img class="image-preview" id="imagePreview">
            <input type="hidden" id="framedImageData">
        </div>
        
        <div class="form-group">
            <label>السعر بعد التخفيض:</label>
            <input type="text" id="salePrice" placeholder="مثال: 25.00 USD">
        </div>
        
        <div class="form-group">
            <label>رابط الشراء:</label>
            <input type="text" id="purchaseLink" placeholder="https://s.click.aliexpress.com/...">
        </div>
        
        <div class="form-group">
            <label>كوبون (اختياري):</label>
            <input type="text" id="couponCode" placeholder="أدخل كود الكوبون...">
        </div>
        
        <div class="section-title"><i class="fab fa-telegram"></i> إعدادات النشر</div>
        
        <div class="form-group">
            <label>القناة:</label>
            <select id="channelSelect">
                <option value="both">كلا القناتين (مقترح)</option>
                <option value="1">القناة الأولى</option>
                <option value="2">القناة الثانية</option>
            </select>
            <div class="channel-badges" id="channelBadges"></div>
        </div>

        <div class="section-title"><i class="fas fa-clock"></i> جدولة النشر (اختياري)</div>
        
        <div class="form-group">
            <label>تاريخ ووقت النشر:</label>
            <input type="datetime-local" id="scheduledTime" style="color-scheme: dark;">
            <p style="font-size: 11px; color: #888; margin-top: 5px;">اتركه فارغاً للنشر الفوري</p>
        </div>
        
        <div class="preview-card">
            <div class="preview-title">معاينة الرسالة (قابلة للتعديل)</div>
            <textarea id="messagePreview" style="width: 100%; min-height: 200px; background: transparent; border: none; color: #fff; font-family: inherit; font-size: 13px; line-height: 1.8; direction: rtl; resize: vertical; padding: 0; overflow: hidden;" spellcheck="false"></textarea>
        </div>
        
        <button class="publish-btn" id="publishBtn">
            <i class="fab fa-telegram"></i> نشر في القناة
        </button>

        <button class="publish-btn" id="scheduleBtn" style="background: linear-gradient(135deg, #FF9800, #F57C00); margin-top: 10px; display: none;">
            <i class="fas fa-clock"></i> جدولة النشر
        </button>

        <button class="action-btn copy-btn" id="copyMsgBtn" style="width: 100%; margin-top: 15px; padding: 15px; font-size: 16px;">
            <i class="fas fa-copy"></i> نسخ نص المنشور كاملاً
        </button>

        <div id="scheduledPostsSection" style="margin-top: 30px; display: none;">
            <div class="section-title"><i class="fas fa-calendar-alt"></i> المنشورات المجدولة</div>
            <div id="scheduledPostsList"></div>
        </div>

        <a href="/saved-posts.html" style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 30px; padding: 18px; background: linear-gradient(135deg, #9C27B0, #7B1FA2); border-radius: 12px; color: #fff; text-decoration: none; font-weight: 700; font-size: 16px;">
            <i class="fas fa-history"></i> المنشورات المحفوظة
        </a>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const defaultSettings = {
            prefix: '📢تخفيض لـ',
            salePrice: '✅السعر بعد التخفيض:',
            linkText: '📌رابط الشراء :',
            couponText: '🎁كوبون:',
            footer: '⚠️ لا تنس استخدام البوت الرسمي لـ AliOffersDz للحصول على أفضل العروض والتخفيضات من AliExpress 👇',
            botLink: '@AliOffersDZ_bot',
            hashtags: '#Aliexpress',
            telegramToken: '',
            channelId: '',
            channelId2: '@AliOffers_Dz'
        };

        let settings = JSON.parse(localStorage.getItem('appSettings')) || { ...defaultSettings };

        const productTitle = document.getElementById('productTitle');
        const productImage = document.getElementById('productImage');
        const salePrice = document.getElementById('salePrice');
        const purchaseLink = document.getElementById('purchaseLink');
        const couponCode = document.getElementById('couponCode');
        const channelSelect = document.getElementById('channelSelect');
        const messagePreview = document.getElementById('messagePreview');
        const imagePreview = document.getElementById('imagePreview');
        const channelBadges = document.getElementById('channelBadges');
        const publishBtn = document.getElementById('publishBtn');
        const copyMsgBtn = document.getElementById('copyMsgBtn');
        const frameBtn = document.getElementById('frameBtn');
        const framedImageData = document.getElementById('framedImageData');
        const imageUpload = document.getElementById('imageUpload');
        const toast = document.getElementById('toast');
        const refineTitleBtn = document.getElementById('refineTitleBtn');
        const algerianHook = document.getElementById('algerianHook');
        const generateHookBtn = document.getElementById('generateHookBtn');
        const refineHookBtn = document.getElementById('refineHookBtn');

        refineHookBtn.onclick = async () => {
            const currentHook = algerianHook.value.trim();
            if (!currentHook) {
                showToast('الرجاء كتابة مقدمة أولاً لتحسينها', 'error');
                return;
            }

            refineHookBtn.disabled = true;
            refineHookBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const res = await fetch('/api/ai-refine-title', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: currentHook, isHook: true })
                });
                const result = await res.json();
                
                if (result.success) {
                    algerianHook.value = result.refinedTitle;
                    updatePreview();
                    showToast('تم تحسين المقدمة ✅', 'success');
                } else {
                    showToast(result.error || 'فشل تحسين المقدمة', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
            } finally {
                refineHookBtn.disabled = false;
                refineHookBtn.innerHTML = '<i class="fas fa-magic"></i> تحسين';
            }
        };

        let isFramed = false;

        generateHookBtn.onclick = async () => {
            const currentTitle = productTitle.value.trim();
            if (!currentTitle) {
                showToast('الرجاء إدخال اسم المنتج أولاً', 'error');
                return;
            }

            generateHookBtn.disabled = true;
            generateHookBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const res = await fetch('/api/generate-algerian-hook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: currentTitle, price: salePrice.value })
                });
                const result = await res.json();
                
                if (result.success) {
                    algerianHook.value = result.hook;
                    updatePreview();
                    showToast('تم توليد المقدمة الجزائرية ✅', 'success');
                } else {
                    showToast(result.error || 'فشل توليد المقدمة', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
            } finally {
                generateHookBtn.disabled = false;
                generateHookBtn.innerHTML = '<i class="fas fa-comment-dots"></i> توليد';
            }
        };

        refineTitleBtn.onclick = async () => {
            const currentTitle = productTitle.value.trim();
            if (!currentTitle) {
                showToast('الرجاء إدخال اسم المنتج أولاً', 'error');
                return;
            }

            refineTitleBtn.disabled = true;
            refineTitleBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const res = await fetch('/api/ai-refine-title', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: currentTitle })
                });
                const result = await res.json();
                
                if (result.success) {
                    productTitle.value = result.refinedTitle;
                    updatePreview();
                    showToast('تم تحسين العنوان ✅', 'success');
                } else {
                    showToast(result.error || 'فشل تحسين العنوان', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
            } finally {
                refineTitleBtn.disabled = false;
                refineTitleBtn.innerHTML = '<i class="fas fa-magic"></i> تحسين';
            }
        };

        function updateChannelBadges() {
            const choice = channelSelect.value;
            let badges = '';
            if (choice === '1' || choice === 'both') {
                badges += `<span class="channel-badge">${settings.channelId || 'القناة 1'}</span>`;
            }
            if (choice === '2' || choice === 'both') {
                badges += `<span class="channel-badge">${settings.channelId2 || '@AliOffers_Dz'}</span>`;
            }
            channelBadges.innerHTML = badges;
        }

        function generateMessage() {
            const s = settings;
            const title = productTitle.value || 'اسم المنتج';
            const salePriceVal = salePrice.value || '0.00';
            const link = purchaseLink.value || 'https://...';
            const coupon = couponCode.value;
            let message = '';
            message += `${s.prefix} ${title}\n`;
            message += `${s.salePrice} ${salePriceVal}\n`;
            message += `${s.linkText}\n${link}\n`;
            if (coupon) message += `${s.couponText} ${coupon}\n`;
            message += `\n${s.footer}\n🔗 ${s.botLink}\n\n${s.hashtags}`;
            
            return message;
        }

        function updatePreview() {
            messagePreview.value = generateMessage();
            autoResizePreview();
        }

        function autoResizePreview() {
            messagePreview.style.height = 'auto';
            messagePreview.style.height = (messagePreview.scrollHeight) + 'px';
        }

        messagePreview.oninput = autoResizePreview;

        imageUpload.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const base64Image = event.target.result;
                    imagePreview.src = base64Image;
                    imagePreview.style.display = 'block';
                    productImage.value = 'صورة محملة يدوياً'; // Placeholder
                    framedImageData.value = base64Image;
                    isFramed = true; // Use framedImageData as the source
                    frameBtn.innerHTML = '<i class="fas fa-image"></i> إطار + لوقو';
                    frameBtn.style.background = 'linear-gradient(135deg, #FF9800, #F57C00)';
                    document.getElementById('logoOnlyBtn').innerHTML = '<i class="fas fa-stamp"></i> لوقو فقط';
                    document.getElementById('logoOnlyBtn').style.background = 'linear-gradient(135deg, #9C27B0, #7B1FA2)';
                };
                reader.readAsDataURL(file);
            }
        };

        productImage.oninput = () => {
            const url = productImage.value;
            if (url) {
                imagePreview.src = url;
                imagePreview.style.display = 'block';
                isFramed = false;
                framedImageData.value = '';
                frameBtn.innerHTML = '<i class="fas fa-image"></i> إطار + لوقو';
                frameBtn.style.background = 'linear-gradient(135deg, #FF9800, #F57C00)';
                document.getElementById('logoOnlyBtn').innerHTML = '<i class="fas fa-stamp"></i> لوقو فقط';
                document.getElementById('logoOnlyBtn').style.background = 'linear-gradient(135deg, #9C27B0, #7B1FA2)';
            } else {
                imagePreview.style.display = 'none';
            }
        };

        frameBtn.onclick = async () => {
            const imageUrl = isFramed && framedImageData.value ? framedImageData.value : productImage.value;
            if (!imageUrl || imageUrl === 'صورة محملة يدوياً') {
                // If it's a manually uploaded image but framedImageData is empty for some reason
                // though it shouldn't be based on the upload handler
                if (isFramed && framedImageData.value) {
                    // correct
                } else {
                    showToast('الرجاء إدخال رابط الصورة أو رفع صورة أولاً', 'error');
                    return;
                }
            }

            frameBtn.disabled = true;
            frameBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إنشاء الإطار...';

            try {
                const watermarkSettings = {
                    position: settings.watermarkPosition || 'bottom-right',
                    size: settings.watermarkSize || 'medium'
                };
                
                const res = await fetch('/api/frame-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageUrl: imageUrl, watermark: watermarkSettings })
                });

                const result = await res.json();
                if (result.success) {
                    imagePreview.src = result.framedImage;
                    imagePreview.style.display = 'block';
                    framedImageData.value = result.framedImage;
                    isFramed = true;
                    frameBtn.innerHTML = '<i class="fas fa-check"></i> تم إضافة الإطار';
                    frameBtn.style.background = '#4CAF50';
                    showToast('تم إضافة الإطار بنجاح! ✅', 'success');
                } else {
                    showToast(result.error || 'فشل في إنشاء الإطار', 'error');
                    frameBtn.innerHTML = '<i class="fas fa-image"></i> إطار + لوقو';
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
                frameBtn.innerHTML = '<i class="fas fa-image"></i> إطار + لوقو';
            } finally {
                frameBtn.disabled = false;
            }
        };

        // Logo only button handler
        const logoOnlyBtn = document.getElementById('logoOnlyBtn');
        logoOnlyBtn.onclick = async () => {
            const imageUrl = framedImageData.value || productImage.value;
            if (!imageUrl || imageUrl === 'صورة محملة يدوياً') {
                showToast('الرجاء إدخال رابط الصورة أو رفع صورة أولاً', 'error');
                return;
            }

            logoOnlyBtn.disabled = true;
            logoOnlyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const watermarkSettings = {
                    position: settings.watermarkPosition || 'bottom-right',
                    size: settings.watermarkSize || 'medium'
                };
                
                const res = await fetch('/api/add-watermark', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageUrl: imageUrl, watermark: watermarkSettings })
                });

                const result = await res.json();
                if (result.success) {
                    imagePreview.src = result.framedImage;
                    imagePreview.style.display = 'block';
                    framedImageData.value = result.framedImage;
                    isFramed = true;
                    logoOnlyBtn.innerHTML = '<i class="fas fa-check"></i> تم';
                    logoOnlyBtn.style.background = '#4CAF50';
                    showToast('تم إضافة اللوقو بنجاح! ✅', 'success');
                } else {
                    showToast(result.error || 'فشل في إضافة اللوقو', 'error');
                    logoOnlyBtn.innerHTML = '<i class="fas fa-stamp"></i> لوقو فقط';
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
                logoOnlyBtn.innerHTML = '<i class="fas fa-stamp"></i> لوقو فقط';
            } finally {
                logoOnlyBtn.disabled = false;
            }
        };

        [productTitle, salePrice, purchaseLink, couponCode, algerianHook].forEach(el => {
            el.oninput = updatePreview;
        });

        channelSelect.onchange = updateChannelBadges;

        function showToast(msg, type = '') {
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.className = 'toast', 3000);
        }

        publishBtn.onclick = async () => {
            if (!productTitle.value || !purchaseLink.value) {
                showToast('الرجاء إدخال اسم المنتج ورابط الشراء', 'error');
                return;
            }

            publishBtn.disabled = true;
            publishBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري النشر...';

            try {
                const credentials = {
                    telegramToken: settings.telegramToken || '',
                    channelId: settings.channelId || '',
                    channelId2: settings.channelId2 || '@AliOffers_Dz',
                    channelChoice: channelSelect.value
                };

                const imageToSend = isFramed && framedImageData.value ? framedImageData.value : (productImage.value || null);
                
                const res = await fetch('/api/publish-telegram', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: productTitle.value,
                        price: salePrice.value,
                        link: purchaseLink.value,
                        coupon: couponCode.value || null,
                        image: imageToSend,
                        settings: settings,
                        credentials: credentials,
                        customMessage: messagePreview.value // Send edited message
                    })
                });

                const result = await res.json();
                if (result.success) {
                    showToast('تم النشر بنجاح! ✅', 'success');
                    // Save post automatically after publishing
                    saveCurrentPost();
                } else {
                    showToast(result.error || 'فشل النشر', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
            } finally {
                publishBtn.disabled = false;
                publishBtn.innerHTML = '<i class="fab fa-telegram"></i> نشر في القناة';
            }
        };

        copyMsgBtn.onclick = () => {
            const msg = messagePreview.value; // Copy edited message
            navigator.clipboard.writeText(msg).then(() => {
                showToast('تم نسخ نص المنشور ✅', 'success');
            });
        };

        // Scheduling functionality
        const scheduledTime = document.getElementById('scheduledTime');
        const scheduleBtn = document.getElementById('scheduleBtn');
        const scheduledPostsSection = document.getElementById('scheduledPostsSection');
        const scheduledPostsList = document.getElementById('scheduledPostsList');

        scheduledTime.onchange = () => {
            if (scheduledTime.value) {
                scheduleBtn.style.display = 'flex';
                publishBtn.innerHTML = '<i class="fab fa-telegram"></i> نشر الآن';
            } else {
                scheduleBtn.style.display = 'none';
                publishBtn.innerHTML = '<i class="fab fa-telegram"></i> نشر في القناة';
            }
        };

        scheduleBtn.onclick = async () => {
            if (!productTitle.value || !purchaseLink.value) {
                showToast('الرجاء إدخال اسم المنتج ورابط الشراء', 'error');
                return;
            }
            if (!scheduledTime.value) {
                showToast('الرجاء تحديد وقت النشر', 'error');
                return;
            }

            scheduleBtn.disabled = true;
            scheduleBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الجدولة...';

            try {
                const credentials = {
                    telegramToken: settings.telegramToken || '',
                    channelId: settings.channelId || '',
                    channelId2: settings.channelId2 || '@AliOffers_Dz',
                    channelChoice: channelSelect.value
                };

                const imageToSend = isFramed && framedImageData.value ? framedImageData.value : (productImage.value || null);
                
                const res = await fetch('/api/schedule-post', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: messagePreview.value, // Use edited message
                        image: imageToSend,
                        scheduledTime: new Date(scheduledTime.value).toISOString(),
                        credentials: credentials
                    })
                });

                const result = await res.json();
                if (result.success) {
                    showToast('تمت جدولة المنشور بنجاح! ⏰', 'success');
                    scheduledTime.value = '';
                    scheduleBtn.style.display = 'none';
                    publishBtn.innerHTML = '<i class="fab fa-telegram"></i> نشر في القناة';
                    loadScheduledPosts();
                } else {
                    showToast(result.error || 'فشل الجدولة', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال', 'error');
            } finally {
                scheduleBtn.disabled = false;
                scheduleBtn.innerHTML = '<i class="fas fa-clock"></i> جدولة النشر';
            }
        };

        async function loadScheduledPosts() {
            try {
                const res = await fetch('/api/scheduled-posts');
                const data = await res.json();
                if (data.success) {
                    const pendingPosts = data.posts.filter(p => p.status === 'pending');
                    if (pendingPosts.length > 0) {
                        scheduledPostsSection.style.display = 'block';
                        scheduledPostsList.innerHTML = pendingPosts.map(p => `
                            <div style="background: #16213e; border-radius: 10px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1);">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                    <span style="color: #FF9800; font-weight: 600;"><i class="fas fa-clock"></i> ${new Date(p.scheduledTime).toLocaleString('ar-EG')}</span>
                                    <button onclick="cancelScheduledPost('${p.id}')" style="background: #ff4444; border: none; border-radius: 5px; padding: 5px 10px; color: #fff; cursor: pointer; font-size: 12px;"><i class="fas fa-times"></i> إلغاء</button>
                                </div>
                                <div style="font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${p.message.substring(0, 50)}...</div>
                            </div>
                        `).join('');
                    } else {
                        scheduledPostsSection.style.display = 'none';
                    }
                } else {
                    scheduledPostsSection.style.display = 'none';
                }
            } catch (e) {
                console.error('Error loading scheduled posts:', e);
                scheduledPostsSection.style.display = 'none';
            }
        }

        window.cancelScheduledPost = async (id) => {
            try {
                await fetch(`/api/scheduled-posts/${id}`, { method: 'DELETE' });
                showToast('تم إلغاء المنشور المجدول', 'success');
                loadScheduledPosts();
            } catch (e) {
                showToast('خطأ في الإلغاء', 'error');
            }
        };

        updateChannelBadges();
        loadScheduledPosts();

        async function saveCurrentPost() {
            const postData = {
                id: Date.now().toString(),
                title: productTitle.value,
                price: salePrice.value,
                link: purchaseLink.value,
                coupon: couponCode.value || null,
                image: isFramed && framedImageData.value ? framedImageData.value : (productImage.value || null),
                message: messagePreview.value,
                hook: algerianHook.value,
                createdAt: new Date().toISOString()
            };
            
            // Save to localStorage as backup
            let localPosts = JSON.parse(localStorage.getItem('savedPosts') || '[]');
            localPosts.unshift(postData);
            if (localPosts.length > 50) localPosts = localPosts.slice(0, 50);
            localStorage.setItem('savedPosts', JSON.stringify(localPosts));
            
            // Also save to server
            try {
                await fetch('/api/saved-posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(postData)
                });
            } catch (e) {
                console.error('Error saving post to server:', e);
            }
        }
        
        // Auto-fill from URL params
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('title')) productTitle.value = urlParams.get('title');
        if (urlParams.has('image')) {
            productImage.value = urlParams.get('image');
            imagePreview.src = productImage.value;
            imagePreview.style.display = 'block';
        }
        if (urlParams.has('price')) salePrice.value = urlParams.get('price');
        if (urlParams.has('link')) purchaseLink.value = urlParams.get('link');

        updatePreview();
    </script>
</body>
</html>
