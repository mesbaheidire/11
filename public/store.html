<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AliOffers DZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pri:#7B2FBE;--pri2:#6225A7;--pri-dark:#4A1A8A;
  --pri-light:#F0EBF8;--pri-pale:#F7F5FA;
  --acc:#50B83C;--acc2:#3D8F2F;
  --bg:#F5F3F7;--card:#fff;
  --text:#1A1A2E;--muted:#8E8E93;--border:#ECEAF0;
  --green:#50B83C;--red:#E53935;
  --shadow:0 2px 16px rgba(123,47,190,.08);
  --radius:16px;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:30px}

/* ===== HEADER ===== */
.header{
  background:#fff;
  padding:14px 14px 0;
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 8px rgba(61,21,96,.06);
}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-icon{
  width:38px;height:38px;
  border-radius:50%;flex-shrink:0;
  overflow:hidden;
}
.logo-icon img{width:100%;height:100%;object-fit:cover}
.logo-text{font-size:15px;font-weight:900;color:var(--pri);white-space:nowrap}
.logo-text span{color:var(--pri2)}
.search-bar{
  flex:1;display:flex;align-items:center;
  background:var(--pri-pale);
  border:1.5px solid var(--border);
  border-radius:25px;height:42px;overflow:hidden;
}
.search-bar input{
  flex:1;border:none;outline:none;background:transparent;
  padding:0 12px;font-family:'Cairo',sans-serif;font-size:13px;
  color:var(--text);direction:rtl;
}
.search-bar input::placeholder{color:#B8B5C0}
.search-bar .s-btn{
  background:var(--pri);border:none;
  width:44px;height:100%;color:#fff;
  cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.cam-btn{
  background:transparent;border:none;
  padding:0 10px;height:100%;
  color:var(--pri2);cursor:pointer;font-size:15px;
  border-right:1px solid var(--border);
  display:flex;align-items:center;flex-shrink:0;
}

/* CATS */
.cats-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:0 2px 14px}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-chip{
  flex-shrink:0;border:1.5px solid var(--border);
  border-radius:22px;padding:6px 16px;
  font-size:12px;font-weight:700;font-family:'Cairo',sans-serif;
  color:var(--muted);background:#fff;cursor:pointer;
  white-space:nowrap;transition:all .2s;
}
.cat-chip.active{
  background:var(--pri);border-color:var(--pri);
  color:#fff;
}

/* ===== HOME PAGE ===== */
.page{display:none}
.page.active{display:block}

/* Hero */
.hero{
  margin:14px 14px 0;
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  border-radius:var(--radius);
  padding:22px 18px;
  display:flex;justify-content:space-between;align-items:center;
  overflow:hidden;position:relative;
}
.hero::before{
  content:'';position:absolute;
  width:140px;height:140px;
  background:rgba(255,255,255,.06);
  border-radius:50%;right:-30px;top:-40px;
}
.hero::after{
  content:'';position:absolute;
  width:80px;height:80px;
  background:rgba(255,255,255,.04);
  border-radius:50%;left:20px;bottom:-30px;
}
.hero-left{z-index:1}
.hero-title{font-size:18px;font-weight:900;color:#fff;line-height:1.3}
.hero-sub{font-size:12px;color:rgba(255,255,255,.75);margin-top:4px}
.hero-btn{
  margin-top:12px;background:#fff;border:none;
  border-radius:22px;padding:8px 18px;
  color:var(--pri);font-family:'Cairo',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;gap:4px;
}
.hero-emoji{font-size:52px;z-index:1;line-height:1}

/* Section */
.sec{margin-top:18px}
.sec-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 14px;margin-bottom:10px;
}
.sec-title{font-size:14px;font-weight:900;display:flex;align-items:center;gap:6px}
.sec-title i{color:var(--pri2)}
.sec-badge{
  background:var(--pri-light);color:var(--pri2);
  font-size:11px;font-weight:700;padding:3px 12px;
  border-radius:20px;border:1px solid rgba(107,33,168,.1);
}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px}

/* Product Card */
.pcard{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);
  overflow:hidden;cursor:pointer;
  transition:transform .15s, box-shadow .15s;
  display:flex;flex-direction:column;
  position:relative;
}
.pcard:active{transform:scale(.97);box-shadow:var(--shadow)}
.pcard-img-wrap{
  position:relative;width:100%;padding-top:95%;
  background:var(--pri-pale);overflow:hidden;
}
.pcard-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;transition:transform .3s;
}
.pcard:active .pcard-img{transform:scale(1.04)}
.no-img{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;color:#D5D0DE;font-size:11px;
}
.no-img i{font-size:30px}
.badge-disc{
  position:absolute;top:8px;right:8px;
  background:var(--red);color:#fff;
  font-size:10px;font-weight:900;
  padding:3px 8px;border-radius:8px;
}
.badge-top{
  position:absolute;top:8px;left:8px;
  background:var(--acc);
  color:#fff;font-size:9px;font-weight:900;
  padding:3px 8px;border-radius:8px;
}
.pcard-body{padding:10px;flex:1;display:flex;flex-direction:column;gap:5px}
.pcard-title{
  font-size:12px;color:var(--text);font-weight:600;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;line-height:1.5;
}
.pcard-price{font-size:18px;font-weight:900;color:var(--pri)}
.pcard-price .cur{font-size:11px;font-weight:600;color:var(--pri2)}
.pcard-dzd{display:none}
.pcard-orig{font-size:11px;color:var(--muted);text-decoration:line-through}
.pcard-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pcard-stars{color:#F5A623;font-size:10px}
.pcard-orders{font-size:10px;color:var(--muted)}
.pcard-buy{
  width:100%;background:var(--pri);
  border:none;border-radius:10px;padding:8px;
  color:#fff;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.pcard-buy:active{opacity:.85}

/* ===== SEARCH PAGE ===== */
.search-filters{
  display:flex;gap:8px;padding:10px 14px;
  overflow-x:auto;scrollbar-width:none;
  background:#fff;border-bottom:1px solid var(--border);
}
.search-filters::-webkit-scrollbar{display:none}
.flt{
  flex-shrink:0;border:1.5px solid var(--border);
  border-radius:10px;padding:6px 14px;
  font-size:11px;font-weight:700;font-family:'Cairo',sans-serif;
  color:var(--muted);background:#fff;cursor:pointer;
  display:flex;align-items:center;gap:4px;
}
.flt.on{background:var(--pri-light);border-color:var(--pri2);color:var(--pri)}
.search-info{
  padding:8px 14px;font-size:12px;color:var(--muted);
  background:#fff;border-bottom:1px solid var(--border);
  display:none;
}
.search-info.show{display:flex;align-items:center;gap:6px}
.search-info i{color:var(--pri2)}

/* ===== STATES ===== */
.loading-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;padding:14px;
}
.skel{
  background:linear-gradient(90deg,#F0ECF5 25%,#E8E3EE 50%,#F0ECF5 75%);
  background-size:200% 100%;
  animation:shimmer 1.3s infinite;
  border-radius:var(--radius);
}
.skel-card{height:250px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty-state{
  text-align:center;padding:50px 20px;color:var(--muted);
}
.empty-state i{font-size:50px;display:block;margin-bottom:12px;opacity:.2;color:var(--pri2)}
.empty-state h3{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--text)}
.empty-state p{font-size:13px}

/* ===== LOAD MORE ===== */
.load-more{
  margin:16px 14px 0;
  width:calc(100% - 28px);
  background:#fff;
  border:2px solid var(--pri);
  border-radius:25px;padding:10px;
  color:var(--pri);font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
  display:none;align-items:center;justify-content:center;gap:6px;
}
.load-more.show{display:flex}

/* ===== DETAIL MODAL ===== */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(42,14,67,.55);z-index:200;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(3px);
}
.overlay.show{display:flex}
.det{
  background:#fff;border-radius:24px 24px 0 0;
  width:100%;max-height:90vh;overflow-y:auto;
  padding:6px 16px 34px;
  animation:up .28s ease;
}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.det-handle{width:38px;height:4px;background:#DDD8E4;border-radius:2px;margin:10px auto 14px}
.det-img{
  width:100%;height:230px;object-fit:contain;
  border-radius:14px;background:var(--pri-pale);margin-bottom:14px;
}
.det-title{font-size:14px;font-weight:700;line-height:1.55;margin-bottom:12px}
.price-row{margin-bottom:12px}
.det-price{font-size:26px;font-weight:900;color:var(--pri)}
.det-price .cur{font-size:14px;font-weight:600;color:var(--pri2)}
.det-dzd{display:none}
.det-orig{font-size:12px;color:var(--muted);text-decoration:line-through;margin-top:2px}
.det-coupon{margin:10px 0}
.coupon-box{display:flex;align-items:center;gap:10px;background:var(--pri-light);border:1.5px dashed var(--pri2);border-radius:12px;padding:10px 14px}
.coupon-box>i{color:var(--pri);font-size:20px}
.coupon-info{flex:1}
.coupon-label{font-size:10px;color:var(--muted);font-weight:600}
.coupon-code{font-size:15px;font-weight:800;color:var(--pri);letter-spacing:1px}
.coupon-copy{background:var(--pri);border:none;border-radius:8px;width:34px;height:34px;color:#fff;font-size:14px;cursor:pointer}
.coupon-copy:active{transform:scale(0.9)}
.det-message{margin:10px 0}
.message-box{background:var(--pri-pale);border-radius:12px;padding:12px 14px;border:1px solid var(--border)}
.message-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px}
.message-label i{color:var(--pri2);margin-left:4px}
.message-text{font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap;max-height:120px;overflow-y:auto}
.det-stats{
  display:flex;border:1px solid var(--border);
  border-radius:14px;overflow:hidden;margin-bottom:14px;
}
.det-stat{
  flex:1;text-align:center;padding:10px 4px;
  border-left:1px solid var(--border);
}
.det-stat:last-child{border-left:none}
.det-stat-val{font-size:14px;font-weight:900;color:var(--text)}
.det-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.det-stat-icon{font-size:12px;color:var(--pri2);margin-bottom:2px}
.det-shop{
  font-size:12px;color:var(--muted);margin-bottom:16px;
  display:flex;align-items:center;gap:6px;
  background:var(--pri-light);padding:8px 12px;border-radius:10px;
}
.det-shop i{color:var(--pri2)}
.det-actions{display:flex;gap:10px}
.btn-buy{
  flex:1;background:var(--pri);
  border:none;border-radius:14px;padding:14px;
  color:#fff;font-family:'Cairo',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-save{
  background:var(--pri-light);border:2px solid var(--pri);
  border-radius:14px;padding:14px 16px;
  color:var(--pri);font-family:'Cairo',sans-serif;
  font-size:15px;cursor:pointer;
}

/* ===== IMAGE SEARCH MODAL ===== */
.img-modal{
  display:none;position:fixed;inset:0;
  background:rgba(42,14,67,.55);z-index:200;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(3px);
}
.img-modal.show{display:flex}
.img-modal-inner{
  background:#fff;border-radius:24px 24px 0 0;
  width:100%;padding:6px 16px 30px;animation:up .28s ease;
}
.upload-zone{
  border:2px dashed var(--pri2);border-radius:14px;
  padding:28px;text-align:center;cursor:pointer;
  color:var(--muted);font-size:13px;
  background:var(--pri-pale);transition:background .2s;
}
.upload-zone i{font-size:38px;color:var(--pri2);display:block;margin-bottom:8px}
.preview-img{width:100%;height:170px;object-fit:contain;border-radius:10px;margin-top:10px;display:none}
.btn-img-search{
  width:100%;background:var(--pri);
  border:none;border-radius:14px;padding:13px;
  color:#fff;font-family:'Cairo',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-img-search:disabled{opacity:.55}
.btn-cancel{
  width:100%;background:transparent;
  border:1.5px solid var(--border);border-radius:14px;padding:11px;
  color:var(--muted);font-family:'Cairo',sans-serif;
  font-size:13px;cursor:pointer;margin-top:8px;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--pri);color:#fff;padding:10px 22px;
  border-radius:22px;font-size:13px;font-weight:700;
  z-index:999;display:none;white-space:nowrap;
}
.toast.show{display:block;animation:ta 2.5s ease}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
@keyframes ta{0%,100%{opacity:0}15%,85%{opacity:1}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo-wrap">
      <div class="logo-icon"><img src="/logo.png" alt="AliOffers DZ"></div>
      <div class="logo-text">Ali<span>Offers</span> DZ</div>
    </div>
    <div class="search-bar">
      <input id="searchInput" type="search" placeholder="ابحث في AliExpress..." autocomplete="off" onkeydown="if(event.key==='Enter')goSearch()">
      <button class="cam-btn" onclick="openImgModal()"><i class="fas fa-camera"></i></button>
      <button class="s-btn" onclick="goSearch()"><i class="fas fa-search"></i></button>
    </div>
  </div>
  <div class="cats-scroll" id="catsBar">
    <div class="cat-chip active" onclick="selectCat('',this)">🏠 الكل</div>
    <div class="cat-chip" onclick="selectCat('electronics',this)">📱 إلكترونيات</div>
    <div class="cat-chip" onclick="selectCat('fashion',this)">👗 أزياء</div>
    <div class="cat-chip" onclick="selectCat('home',this)">🏠 منزل</div>
    <div class="cat-chip" onclick="selectCat('beauty',this)">💄 جمال</div>
    <div class="cat-chip" onclick="selectCat('kids',this)">🧸 أطفال</div>
    <div class="cat-chip" onclick="selectCat('sports',this)">⚽ رياضة</div>
  </div>
</div>

<!-- HOME PAGE -->
<div class="page active" id="homePage">
  <div class="hero">
    <div class="hero-left">
      <div class="hero-title">أحدث العروض 🔥</div>
      <div class="hero-sub">منتجات مختارة لك بأسعار مميزة</div>
      <button class="hero-btn" onclick="document.getElementById('searchInput').focus()">
        <i class="fas fa-search"></i> ابحث الآن
      </button>
    </div>
    <div class="hero-emoji">🎁</div>
  </div>

  <div class="sec" id="savedSec">
    <div class="sec-header">
      <div class="sec-title"><i class="fas fa-star"></i> منتجاتنا المميزة</div>
      <span class="sec-badge" id="savedBadge">0 منشور</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0 12px">
      <input id="savedDeleteBefore" type="date" style="flex:1;min-width:160px;border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;font-family:'Cairo';font-size:13px;outline:none;background:#fff">
      <button class="hero-btn" style="padding:8px 12px" onclick="deleteSavedBefore()"><i class="fas fa-trash"></i> حذف قبل التاريخ</button>
      <button class="hero-btn" style="padding:8px 12px;background:#b42318" onclick="clearAllSaved()"><i class="fas fa-broom"></i> مسح الكل</button>
    </div>
    <div id="savedGrid" class="loading-grid">
      <div class="skel skel-card"></div>
      <div class="skel skel-card"></div>
      <div class="skel skel-card"></div>
      <div class="skel skel-card"></div>
    </div>
  </div>

</div>

<!-- SEARCH PAGE -->
<div class="page" id="searchPage">
  <div class="search-filters">
    <button class="flt on" id="fOrders" onclick="setFlt('orders',this)"><i class="fas fa-fire"></i> الأكثر مبيعاً</button>
    <button class="flt" id="fAsc" onclick="setFlt('price_asc',this)"><i class="fas fa-arrow-up"></i> الأرخص</button>
    <button class="flt" id="fDesc" onclick="setFlt('price_desc',this)"><i class="fas fa-arrow-down"></i> الأغلى</button>
    <button class="flt" id="fPrice" onclick="togglePriceFlt()"><i class="fas fa-dollar-sign"></i> السعر</button>
  </div>
  <div id="priceFlt" style="display:none;background:#fff;padding:10px 14px;border-bottom:1px solid var(--border)">
    <div style="display:flex;gap:8px;align-items:flex-end">
      <div style="flex:1"><label style="font-size:11px;color:var(--muted)">من $</label><input id="minP" type="number" placeholder="0" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:7px 8px;font-family:'Cairo';font-size:13px;margin-top:4px;outline:none"></div>
      <div style="flex:1"><label style="font-size:11px;color:var(--muted)">إلى $</label><input id="maxP" type="number" placeholder="100" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:7px 8px;font-family:'Cairo';font-size:13px;margin-top:4px;outline:none"></div>
      <button onclick="goSearch()" style="background:var(--pri);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-family:'Cairo';font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0">بحث</button>
    </div>
  </div>
  <div class="search-info" id="searchInfo"></div>
  <div style="padding:14px 14px 0">
    <div id="searchGrid" class="grid"></div>
  </div>
  <button class="load-more" id="loadMoreBtn" onclick="loadMore()"><i class="fas fa-plus"></i> تحميل المزيد</button>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detOverlay" onclick="if(event.target===this)closeDet()">
  <div class="det">
    <div class="det-handle"></div>
    <img id="detImg" class="det-img" src="" onerror="this.style.display='none'">
    <div class="det-title" id="detTitle"></div>
    <div class="price-row">
      <div class="det-price" id="detPrice"></div>
      <div class="det-dzd" id="detDzd"></div>
      <div class="det-orig" id="detOrig"></div>
    </div>
    <div class="det-stats">
      <div class="det-stat">
        <div class="det-stat-icon"><i class="fas fa-star"></i></div>
        <div class="det-stat-val" id="dRating">—</div>
        <div class="det-stat-lbl">تقييم</div>
      </div>
      <div class="det-stat">
        <div class="det-stat-icon"><i class="fas fa-shopping-bag"></i></div>
        <div class="det-stat-val" id="dOrders">—</div>
        <div class="det-stat-lbl">طلب</div>
      </div>
      <div class="det-stat">
        <div class="det-stat-icon"><i class="fas fa-tag"></i></div>
        <div class="det-stat-val" id="dDisc">—</div>
        <div class="det-stat-lbl">خصم</div>
      </div>
    </div>
    <div class="det-shop" id="detShop" style="display:none"><i class="fas fa-store"></i><span id="detShopName"></span></div>
    <div class="det-coupon" id="detCoupon" style="display:none">
      <div class="coupon-box">
        <i class="fas fa-ticket-alt"></i>
        <div class="coupon-info">
          <div class="coupon-label">كوبون خصم</div>
          <div class="coupon-code" id="detCouponCode"></div>
        </div>
        <button class="coupon-copy" onclick="copyCoupon()"><i class="fas fa-copy"></i></button>
      </div>
    </div>
    <div class="det-message" id="detMessage" style="display:none">
      <div class="message-box">
        <div class="message-label"><i class="fas fa-comment-dots"></i> وصف المنتج</div>
        <div class="message-text" id="detMessageText"></div>
      </div>
    </div>
    <div class="det-actions">
      <button class="btn-buy" onclick="buyNow()"><i class="fas fa-shopping-cart"></i> اشتري الآن</button>
      <button class="btn-save" onclick="saveProduct()"><i class="fas fa-bookmark"></i></button>
    </div>
  </div>
</div>

<!-- IMAGE SEARCH MODAL -->
<div class="img-modal" id="imgModal">
  <div class="img-modal-inner">
    <div class="det-handle"></div>
    <div style="text-align:center;font-size:15px;font-weight:700;margin-bottom:14px"><i class="fas fa-camera" style="color:var(--acc)"></i> بحث بالصورة</div>
    <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="onImg(event)">
    <div class="upload-zone" onclick="document.getElementById('imgFile').click()">
      <i class="fas fa-image"></i>
      <div style="font-weight:700">اضغط لاختيار صورة منتج</div>
      <div style="font-size:11px;margin-top:4px;color:var(--muted)">الذكاء الاصطناعي يحلل الصورة ويبحث عن منتجات مشابهة</div>
    </div>
    <img id="imgPrev" class="preview-img" src="">
    <button class="btn-img-search" id="imgSearchBtn" onclick="doImgSearch()" disabled>
      <i class="fas fa-search"></i> ابحث بهذه الصورة
    </button>
    <button class="btn-cancel" onclick="closeImgModal()">إلغاء</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();try{tg.setHeaderColor('#ffffff')}catch(e){}}

const DZD=137;
let curProduct=null,curSort='orders',curCat='',curPage=1,curQ='',curProducts=[],hasMore=false,isLoading=false,imgData='',priceFltOpen=false;
const tgUserId=tg?.initDataUnsafe?.user?.id||'anon';
function track(type,detail){fetch('/api/store/track',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type,detail,userId:String(tgUserId)})}).catch(()=>{});}
track('visit','store_open');

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const toDZD=u=>{if(!u)return'';const n=parseFloat(u);return isNaN(n)?'':(Math.round(n*DZD)).toLocaleString('ar-DZ')+' دج'};
const toStars=r=>{if(!r)return'';const n=Math.round(parseFloat(r)/20);return'★'.repeat(n)+'☆'.repeat(5-n)};
const toast=(m,t)=>{const el=document.getElementById('toast');el.textContent=m;el.className='toast show'+(t?' '+t:'');setTimeout(()=>el.className='toast',2500)};

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active')}

// ===== HOME: SAVED POSTS =====
let savedProducts=[];
async function loadSaved(){
  try{
    const r=await fetch('/api/saved-posts');
    const d=await r.json();
    savedProducts=d.posts||[];
    const grid=document.getElementById('savedGrid');
    document.getElementById('savedBadge').textContent=savedProducts.length+' منشور';
    if(!savedProducts.length){
      grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--muted)"><i class="fas fa-box-open" style="font-size:40px;display:block;margin-bottom:10px;opacity:.2;color:var(--pri)"></i><p>لا توجد منتجات محفوظة بعد</p><p style="font-size:11px;margin-top:4px">ابدأ بنشر منتجات من بوت التجسس</p></div>';
      return;
    }
    grid.innerHTML=savedProducts.map((p,i)=>{
      const rawPrice=p.price||'';
      const isDZD=/دج|DZD/i.test(rawPrice);
      let displayPrice=rawPrice.replace(/[^\d.,]/g,'').replace(',','.');
      if(isDZD&&displayPrice){displayPrice=(parseFloat(displayPrice)/DZD).toFixed(2)}
      return cardHTML({
        title:p.title,
        image_url:p.image,
        price:displayPrice,
        _rawPrice:rawPrice,
        currency:'USD',
        promotion_link:p.link,
        product_url:p.link,
        rating:p.rating||null,
        orders:p.orders||null,
        discount:p.discount||null,
        _savedIdx:i,_saved:true
      },i,savedProducts.length);
    }).join('');
    enrichSavedProducts();
  }catch(e){document.getElementById('savedGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--muted)">تعذر التحميل</div>'}
}

function cardHTML(p,i,total){
  const isNew=i<2&&total>2;
  const ratingRaw=p.rating!=null&&p.rating!==''?p.rating:null;
  const ordersRaw=p.orders!=null&&p.orders!==''?p.orders:null;
  const discountRaw=p.discount!=null&&p.discount!==''?p.discount:null;
  const ratingVal=ratingRaw?(Math.round(parseFloat(ratingRaw)/20*10)/10):null;
  const disc=discountRaw?(/%/.test(String(discountRaw))?String(discountRaw):parseInt(discountRaw)+'%'):'';
  const priceVal=p.price||p.sale_price||'';
  const onclickData=p._saved?`openSaved(savedProducts[${p._savedIdx}])`:`openDet(curProducts[${i}])`;
  const buyOnclick=p._saved?`event.stopPropagation();buySaved(savedProducts[${p._savedIdx}])`:`event.stopPropagation();quickBuy(curProducts[${i}])`;
  const showPrice=priceVal?`<div class="pcard-price"><span class="cur">USD</span> ${esc(priceVal)}</div>`:'';
  const origPrice=p.original_price&&p.original_price!==priceVal?`<div class="pcard-orig">${esc(p.original_price)} USD</div>`:'';
  return`<div class="pcard" onclick="${onclickData}">
    <div class="pcard-img-wrap">
      ${p.image_url?`<img class="pcard-img" src="${esc(p.image_url)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
      <div class="no-img" style="display:${p.image_url?'none':'flex'}"><i class="fas fa-image"></i></div>
      ${disc?`<span class="badge-disc">-${disc}</span>`:''}
      ${isNew?`<span class="badge-top">✨ جديد</span>`:''}
    </div>
    <div class="pcard-body">
      <div class="pcard-title">${esc(p.title||'منتج')}</div>
      <div>${showPrice}${origPrice}</div>
      ${(ratingVal||ordersRaw)?`<div class="pcard-meta">${ratingVal?`<span class="pcard-stars">${toStars(ratingRaw)}</span>`:''}${ordersRaw?`<span class="pcard-orders">${Number(ordersRaw).toLocaleString()} طلب</span>`:''}</div>`:''}
      <button class="pcard-buy" onclick="${buyOnclick}"><i class="fas fa-shopping-cart"></i> اشتري الآن</button>
    </div>
  </div>`;
}

function extractProductId(link){
  if(!link)return null;
  const m=link.match(/\/(\d{8,15})\b/)||link.match(/productId[=:](\d+)/i)||link.match(/item\/(\d+)/);
  return m?m[1]:null;
}

async function enrichSavedProducts(){
  const ids=[];
  savedProducts.forEach((p,i)=>{
    if(!p._enriched){
      const pid=extractProductId(p.link);
      if(pid)ids.push({idx:i,pid});
    }
  });
  if(!ids.length)return;
  const batchIds=ids.slice(0,10).map(x=>x.pid).join(',');
  try{
    const r=await fetch('/api/store/product-info?ids='+encodeURIComponent(batchIds));
    if(!r.ok)return;
    const d=await r.json();
    if(!d.success||!d.products)return;
    const map={};
    d.products.forEach(p=>{map[p.id]=p});
    let changed=false;
    ids.slice(0,10).forEach(({idx,pid})=>{
      const info=map[pid];
      if(info){
        savedProducts[idx].rating=info.rating;
        savedProducts[idx].orders=info.orders;
        savedProducts[idx].discount=info.discount;
        savedProducts[idx].apiPrice=info.price;
        savedProducts[idx]._enriched=true;
        changed=true;
      }
    });
    if(changed){
      const grid=document.getElementById('savedGrid');
      grid.innerHTML=savedProducts.map((p,i)=>{
        const rawPrice=p.price||'';
        const isDZD=/دج|DZD/i.test(rawPrice);
        let displayPrice=rawPrice.replace(/[^\d.,]/g,'').replace(',','.');
        if(isDZD&&displayPrice){displayPrice=(parseFloat(displayPrice)/DZD).toFixed(2)}
        if(p.apiPrice&&(!displayPrice||displayPrice==='0'||displayPrice==='NaN'))displayPrice=p.apiPrice;
        return cardHTML({
          title:p.title,
          image_url:p.image,
          price:displayPrice,
          _rawPrice:rawPrice,
          currency:'USD',
          promotion_link:p.link,
          product_url:p.link,
          rating:p.rating||null,
          orders:p.orders||null,
          discount:p.discount||null,
          _savedIdx:i,_saved:true
        },i,savedProducts.length);
      }).join('');
    }
  }catch(e){}
}

async function openSaved(p){track('click',p?.title||'saved_product');
  const rawPrice=p.price||'';
  const isDZD=/دج|DZD/i.test(rawPrice);
  let usdPrice=rawPrice.replace(/[^\d.,]/g,'').replace(',','.');
  if(isDZD&&usdPrice){usdPrice=(parseFloat(usdPrice)/DZD).toFixed(2)}
  if(p.apiPrice&&(!usdPrice||usdPrice==='0'||usdPrice==='NaN'))usdPrice=p.apiPrice;
  curProduct={title:p.title,image_url:p.image,price:usdPrice,currency:'USD',promotion_link:p.link,product_url:p.link,rating:p.rating||null,orders:p.orders||null,discount:p.discount||null,shop_name:null,_coupon:p.coupon||null,_message:p.message||p.hook||null,_saved:true};
  showDet();
  // جلب فوري للبيانات المفقودة (تقييم/طلب/خصم) من AliExpress API
  if(!curProduct.rating||!curProduct.orders||!curProduct.discount){
    const pid=extractProductId(p.link);
    if(pid){
      try{
        const r=await fetch('/api/store/product-info?ids='+encodeURIComponent(pid));
        const d=await r.json();
        const info=d.products&&d.products[0];
        if(info&&curProduct&&(curProduct._saved)){
          if(info.rating!=null&&info.rating!=='')curProduct.rating=info.rating;
          if(info.orders!=null&&info.orders!=='')curProduct.orders=info.orders;
          if(info.discount!=null&&info.discount!=='')curProduct.discount=info.discount;
          if(info.shop_name)curProduct.shop_name=info.shop_name;
          if(info.original_price&&!curProduct.original_price)curProduct.original_price=info.original_price;
          if(info.price&&(!curProduct.price||curProduct.price==='0'))curProduct.price=info.price;
          // تحديث الواجهة المعروضة حالياً
          if(document.getElementById('detOverlay').classList.contains('show')){
            const ratingVal=curProduct.rating?(Math.round(parseFloat(curProduct.rating)/20*10)/10):null;
            document.getElementById('dRating').textContent=ratingVal?(ratingVal.toFixed(1)):'—';
            document.getElementById('dOrders').textContent=curProduct.orders!=null&&curProduct.orders!==''?Number(curProduct.orders).toLocaleString():'—';
            document.getElementById('dDisc').textContent=curProduct.discount!=null&&curProduct.discount!==''?(/%/.test(String(curProduct.discount))?String(curProduct.discount):parseInt(curProduct.discount)+'%'):'—';
            if(curProduct.shop_name){document.getElementById('detShop').style.display='flex';document.getElementById('detShopName').textContent=curProduct.shop_name}
          }
        }
      }catch(e){}
    }
  }
}
async function deleteSavedBefore(){
  const input=document.getElementById('savedDeleteBefore');
  if(!input.value){toast('اختار تاريخ أولاً','err');return}
  if(!confirm('هل تريد حذف كل المنشورات الأقدم من هذا التاريخ؟'))return;
  try{
    const r=await fetch('/api/saved-posts/before',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({date:new Date(input.value).toISOString()})});
    const d=await r.json();
    if(!d.success) throw new Error(d.error||'فشل الحذف');
    toast('تم حذف المنشورات الأقدم من التاريخ');
    loadSaved();
  }catch(e){toast(e.message||'فشل الحذف','err')}
}
async function clearAllSaved(){
  if(!confirm('هل تريد مسح كل المنشورات المحفوظة؟'))return;
  try{
    const r=await fetch('/api/saved-posts',{method:'DELETE'});
    const d=await r.json();
    if(!d.success) throw new Error(d.error||'فشل المسح');
    toast('تم مسح كل المنشورات');
    loadSaved();
  }catch(e){toast(e.message||'فشل المسح','err')}
}
function buySaved(p){openURL(p.link)}

// ===== SEARCH =====
function goSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q&&!curCat){toast('اكتب كلمة للبحث','err');return}
  curQ=q;curPage=1;curProducts=[];
  if(q)track('search',q);
  showPage('searchPage');
  fetchSearch(true);
}

function selectCat(cat,el){
  curCat=cat;
  document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  if(cat)track('category',cat);
  if(curQ||cat){
    curPage=1;curProducts=[];
    showPage(cat?'searchPage':'homePage');
    if(cat){fetchSearch(true)}
  }else{showPage('homePage')}
}

function setFlt(s,el){
  curSort=s;curPage=1;curProducts=[];
  document.querySelectorAll('.flt').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  fetchSearch(true);
}

function togglePriceFlt(){
  priceFltOpen=!priceFltOpen;
  document.getElementById('priceFlt').style.display=priceFltOpen?'block':'none';
  document.getElementById('fPrice').classList.toggle('on',priceFltOpen);
}

async function fetchSearch(reset=true){
  if(isLoading)return;
  isLoading=true;
  const grid=document.getElementById('searchGrid');
  if(reset)grid.innerHTML='<div style="grid-column:1/-1;display:flex;justify-content:center;align-items:center;padding:40px;gap:10px;color:var(--muted)"><i class="fas fa-spinner fa-spin" style="color:var(--pri);font-size:24px"></i> جاري البحث في AliExpress...</div>';
  document.getElementById('loadMoreBtn').classList.remove('show');
  try{
    const minP=document.getElementById('minP').value;
    const maxP=document.getElementById('maxP').value;
    let url=`/api/store/search?sort=${curSort}&page=${curPage}`;
    if(curQ)url+=`&q=${encodeURIComponent(curQ)}`;
    if(curCat)url+=`&category=${curCat}`;
    if(minP)url+=`&minPrice=${minP}`;
    if(maxP)url+=`&maxPrice=${maxP}`;
    const r=await fetch(url);
    const data=await r.json();
    const prods=data.products||[];
    if(reset)curProducts=prods;else curProducts=[...curProducts,...prods];
    hasMore=prods.length===20&&curProducts.length<(data.total||0);
    const info=document.getElementById('searchInfo');
    if(curQ){
      let infoText=`<i class="fas fa-search"></i> نتائج البحث عن "<strong>${esc(curQ)}</strong>"`;
      if(data.translatedQuery) infoText+=` → <strong style="color:var(--pri-dark)">${esc(data.translatedQuery)}</strong>`;
      infoText+=` — ${data.total||prods.length} منتج`;
      info.innerHTML=infoText;
      info.classList.add('show');
    }else{info.classList.remove('show')}
    if(!curProducts.length){
      grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--muted)"><i class="fas fa-search" style="font-size:40px;display:block;margin-bottom:10px;opacity:.2;color:var(--pri)"></i><h3>لا توجد نتائج</h3><p>جرب كلمة بحث أخرى</p></div>';
    }else{
      const html=curProducts.map((p,i)=>cardHTML(p,i,curProducts.length)).join('');
      if(reset)grid.innerHTML=html;else grid.innerHTML+=html;
    }
    document.getElementById('loadMoreBtn').classList.toggle('show',hasMore);
  }catch(e){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--muted)">تعذر الاتصال بـ AliExpress</div>'}
  isLoading=false;
}

function loadMore(){curPage++;fetchSearch(false)}

// ===== DETAIL =====
function openDet(p){curProduct=p;track('click',p?.title||p?.id||'product');showDet()}
function showDet(){
  const p=curProduct;if(!p)return;
  const img=document.getElementById('detImg');
  img.src=p.image_url||'';img.style.display=p.image_url?'block':'none';
  document.getElementById('detTitle').textContent=p.title||'منتج';
  const price=p.price||p.sale_price||'';
  document.getElementById('detPrice').innerHTML=price?`<span class="cur">USD</span> ${esc(price)}`:'';
  document.getElementById('detOrig').textContent=p.original_price&&p.original_price!==price?('الأصلي: '+p.original_price+' USD'):'';
  const ratingVal=p.rating!=null&&p.rating!==''?(Math.round(parseFloat(p.rating)/20*10)/10):null;
  const ordersVal=p.orders!=null&&p.orders!==''?Number(p.orders).toLocaleString():'—';
  const discVal=p.discount!=null&&p.discount!==''?(/%/.test(String(p.discount))?String(p.discount):parseInt(p.discount)+'%'):'—';
  document.getElementById('dRating').textContent=ratingVal?(ratingVal.toFixed(1)):'—';
  document.getElementById('dOrders').textContent=ordersVal;
  document.getElementById('dDisc').textContent=discVal;
  const shop=document.getElementById('detShop');
  if(p.shop_name){shop.style.display='flex';document.getElementById('detShopName').textContent=p.shop_name}else{shop.style.display='none'}
  const couponEl=document.getElementById('detCoupon');
  if(p._coupon){couponEl.style.display='block';document.getElementById('detCouponCode').textContent=p._coupon}else{couponEl.style.display='none'}
  const msgEl=document.getElementById('detMessage');
  if(p._message){msgEl.style.display='block';document.getElementById('detMessageText').textContent=p._message}else{msgEl.style.display='none'}
  document.getElementById('detOverlay').classList.add('show');
  if(tg){tg.BackButton.show();tg.BackButton.onClick(closeDet)}
}
function closeDet(){document.getElementById('detOverlay').classList.remove('show');if(tg)tg.BackButton.hide()}

function copyCoupon(){
  const code=document.getElementById('detCouponCode').textContent;
  if(!code)return;
  navigator.clipboard.writeText(code).then(()=>toast('تم نسخ الكوبون ✓','ok')).catch(()=>{
    const t=document.createElement('textarea');t.value=code;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);toast('تم نسخ الكوبون ✓','ok');
  });
}
function openURL(url){if(!url){toast('لا يوجد رابط','err');return}if(tg)tg.openLink(url);else window.open(url,'_blank')}
function buyNow(){openURL(curProduct?.promotion_link||curProduct?.product_url||'')}
function quickBuy(p){track('click',p?.title||p?.id||'buy');openURL(p?.promotion_link||p?.product_url||'')}

async function saveProduct(){
  if(!curProduct)return;
  try{
    const body={title:curProduct.title,price:curProduct._dzdPrice||toDZD(curProduct.price||''),link:curProduct.promotion_link||curProduct.product_url||'',image:curProduct.image_url||'',id:Date.now().toString()};
    await fetch('/api/saved-posts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    toast('تم الحفظ ✓','ok');loadSaved();
  }catch(e){toast('فشل الحفظ','err')}
}

// ===== IMAGE SEARCH =====
function openImgModal(){document.getElementById('imgModal').classList.add('show')}
function closeImgModal(){document.getElementById('imgModal').classList.remove('show');imgData='';document.getElementById('imgPrev').style.display='none';document.getElementById('imgSearchBtn').disabled=true;document.getElementById('imgFile').value=''}

function onImg(e){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    imgData=ev.target.result;
    const pr=document.getElementById('imgPrev');pr.src=imgData;pr.style.display='block';
    document.getElementById('imgSearchBtn').disabled=false;
  };rd.readAsDataURL(f);
}

async function doImgSearch(){
  if(!imgData){toast('اختر صورة أولاً','err');return}
  const btn=document.getElementById('imgSearchBtn');
  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> الذكاء الاصطناعي يحلل الصورة...';
  try{
    const r=await fetch('/api/store/image-search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageData:imgData})});
    const data=await r.json();
    closeImgModal();
    if(!data.success){toast(data.error||'فشل البحث','err');return}
    curQ='';curPage=1;curProducts=data.products||[];hasMore=false;
    document.getElementById('searchInput').value='';
    showPage('searchPage');
    const info=document.getElementById('searchInfo');
    info.innerHTML=`<i class="fas fa-camera"></i> الذكاء الاصطناعي وجد: <strong>${esc(data.keywords)}</strong>`;
    info.classList.add('show');
    const grid=document.getElementById('searchGrid');
    grid.innerHTML=curProducts.length?curProducts.map((p,i)=>cardHTML(p,i,curProducts.length)).join(''):'<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--muted)">لا توجد نتائج للصورة</div>';
    document.getElementById('loadMoreBtn').classList.remove('show');
  }catch(e){toast('خطأ في البحث','err')}
  btn.disabled=false;btn.innerHTML='<i class="fas fa-search"></i> ابحث بهذه الصورة';
}

loadSaved();
</script>
</body>
</html>
