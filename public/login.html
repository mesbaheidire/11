<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AliOffers DZ - تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#7B2FBE;--pri2:#6225A7;--bg:#F5F3F7;--card:#fff;--text:#1A1A2E;--muted:#8E8E93;--border:#ECEAF0;--green:#50B83C;--red:#E53935}
body{font-family:'Cairo',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--card);border-radius:24px;padding:40px 28px;max-width:380px;width:100%;box-shadow:0 8px 40px rgba(123,47,190,.12);text-align:center}
.logo{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--pri2));display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 4px 20px rgba(123,47,190,.3)}
.logo i{font-size:36px;color:#fff}
h1{font-size:22px;font-weight:900;color:var(--pri);margin-bottom:6px}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:30px}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2.5px solid var(--border);transition:all .2s}
.pin-dot.filled{background:var(--pri);border-color:var(--pri);transform:scale(1.1)}
.pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto 20px}
.num-btn{width:100%;aspect-ratio:1.4;border:none;border-radius:16px;font-size:24px;font-weight:700;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.num-btn:active{background:var(--pri);color:#fff;transform:scale(.95)}
.num-btn.empty{background:transparent;cursor:default}
.num-btn.del{font-size:18px;color:var(--muted)}
.fingerprint-btn{width:100%;padding:14px;border:2px solid var(--pri);border-radius:16px;background:transparent;color:var(--pri);font-size:15px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;transition:all .2s}
.fingerprint-btn:active{background:var(--pri);color:#fff}
.fingerprint-btn.hidden{display:none}
.msg{font-size:12px;color:var(--muted);margin-top:16px;min-height:20px}
.msg.error{color:var(--red)}
.msg.success{color:var(--green)}
.setup-info{font-size:13px;color:var(--pri2);margin-bottom:20px;padding:12px;background:rgba(123,47,190,.06);border-radius:12px}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo"><i class="fas fa-lock"></i></div>
  <h1>AliOffers DZ</h1>
  <div class="subtitle" id="subtitle">أدخل رمز PIN للدخول</div>
  <div class="setup-info" id="setupInfo" style="display:none">أول مرة؟ أدخل رمز PIN من 4 أرقام لحماية التطبيق</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="numpad" id="numpad">
    <button class="num-btn" onclick="addDigit('1')">1</button>
    <button class="num-btn" onclick="addDigit('2')">2</button>
    <button class="num-btn" onclick="addDigit('3')">3</button>
    <button class="num-btn" onclick="addDigit('4')">4</button>
    <button class="num-btn" onclick="addDigit('5')">5</button>
    <button class="num-btn" onclick="addDigit('6')">6</button>
    <button class="num-btn" onclick="addDigit('7')">7</button>
    <button class="num-btn" onclick="addDigit('8')">8</button>
    <button class="num-btn" onclick="addDigit('9')">9</button>
    <button class="num-btn empty"></button>
    <button class="num-btn" onclick="addDigit('0')">0</button>
    <button class="num-btn del" onclick="delDigit()"><i class="fas fa-backspace"></i></button>
  </div>
  <button class="fingerprint-btn hidden" id="fpBtn" onclick="doFingerprint()">
    <i class="fas fa-fingerprint"></i> الدخول بالبصمة
  </button>
  <div class="msg" id="msg"></div>
</div>

<script src="https://unpkg.com/@simplewebauthn/browser@11/dist/bundle/index.umd.min.js"></script>
<script>
const { startRegistration, startAuthentication } = SimpleWebAuthnBrowser;
let pin='', isSetup=false, isConfirm=false, firstPin='', locked=false;

async function init(){
  try{
    const r=await fetch('/api/auth/status');
    const d=await r.json();
    if(d.authenticated){window.location.href='/';return}
    isSetup=!d.pinSet;
    if(isSetup){
      document.getElementById('subtitle').textContent='أنشئ رمز PIN جديد';
      document.getElementById('setupInfo').style.display='block';
    }
    if(d.webauthnRegistered && !isSetup){
      document.getElementById('fpBtn').classList.remove('hidden');
      setTimeout(doFingerprint,500);
    }
  }catch(e){}
}

function updateDots(){
  const dots=document.querySelectorAll('.pin-dot');
  dots.forEach((d,i)=>{d.className='pin-dot'+(i<pin.length?' filled':'')});
}

function showMsg(text,type){
  const el=document.getElementById('msg');
  el.textContent=text;
  el.className='msg'+(type?' '+type:'');
}

function addDigit(d){
  if(locked||pin.length>=4)return;
  pin+=d;
  updateDots();
  if(pin.length===4)setTimeout(submitPin,200);
}

function delDigit(){
  if(locked)return;
  pin=pin.slice(0,-1);
  updateDots();
}

async function submitPin(){
  if(isSetup&&!isConfirm){
    firstPin=pin;
    pin='';
    isConfirm=true;
    updateDots();
    document.getElementById('subtitle').textContent='أعد إدخال الرمز للتأكيد';
    document.getElementById('setupInfo').style.display='none';
    return;
  }
  if(isSetup&&isConfirm){
    if(pin!==firstPin){
      showError('الرمزان غير متطابقين — حاول مجدداً');
      pin='';firstPin='';isConfirm=false;
      updateDots();
      document.getElementById('subtitle').textContent='أنشئ رمز PIN جديد';
      document.getElementById('setupInfo').style.display='block';
      return;
    }
    locked=true;
    try{
      const r=await fetch('/api/auth/setup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})});
      const d=await r.json();
      if(d.success){
        showMsg('تم إنشاء الرمز بنجاح','success');
        setTimeout(()=>registerFingerprint(d.token),800);
      }else{showError(d.error||'خطأ');locked=false}
    }catch(e){showError('خطأ في الاتصال');locked=false}
    return;
  }
  locked=true;
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})});
    const d=await r.json();
    if(d.success){
      showMsg('تم الدخول','success');
      setTimeout(()=>window.location.href='/',500);
    }else{showError(d.error||'رمز خاطئ');locked=false}
  }catch(e){showError('خطأ في الاتصال');locked=false}
}

function showError(msg){
  document.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('error'));
  showMsg(msg,'error');
  pin='';
  setTimeout(()=>{updateDots();showMsg('')},1500);
}

async function registerFingerprint(token){
  if(!window.PublicKeyCredential){
    window.location.href='/';return;
  }
  try{
    const optRes=await fetch('/api/auth/webauthn/register-options',{headers:{'Authorization':'Bearer '+token}});
    const opts=await optRes.json();
    if(!opts.success){window.location.href='/';return}
    const attResp=await startRegistration({optionsJSON:opts.options});
    attResp.challengeId=opts.challengeId;
    const verRes=await fetch('/api/auth/webauthn/register-verify',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(attResp)});
    const ver=await verRes.json();
    if(ver.success){showMsg('تم تسجيل البصمة بنجاح','success')}
  }catch(e){}
  setTimeout(()=>window.location.href='/',1000);
}

async function doFingerprint(){
  try{
    const optRes=await fetch('/api/auth/webauthn/auth-options');
    const opts=await optRes.json();
    if(!opts.success)return;
    const authResp=await startAuthentication({optionsJSON:opts.options});
    authResp.challengeId=opts.challengeId;
    const verRes=await fetch('/api/auth/webauthn/auth-verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(authResp)});
    const ver=await verRes.json();
    if(ver.success){
      showMsg('تم الدخول بالبصمة','success');
      setTimeout(()=>window.location.href='/',500);
    }else{showMsg('فشل التحقق — استخدم الرمز','error')}
  }catch(e){showMsg('البصمة غير متاحة — استخدم الرمز','error')}
}

init();
</script>
</body>
</html>
